<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - Licores Galileo</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background-color:#f4f4f4;
    }

    header{
      background:#6b0000;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
    }

    nav ul{
      list-style:none;
      display:flex;
    }

    nav ul li{
      margin-left:20px;
    }

    nav ul li a{
      color:white;
      text-decoration:none;
      font-size:18px;
      transition:0.3s;
    }

    nav ul li a:hover{
      color:#ffd700;
    }

    /* Carrito */
    .carrito {
      position: relative;
      font-size: 28px;
      margin-left: 20px;
    }

    .carrito a {
      color: white;
      text-decoration: none;
    }

    .carrito #contador {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #ffd700;
      color: #6b0000;
      font-size: 14px;
      font-weight: bold;
      border-radius: 50%;
      padding: 2px 6px;
    }

    .contenedor{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      padding:30px;
    }

    .producto{
      width:250px;
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      text-align:center;
    }

    .producto img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .producto h3{
      margin:10px 0;
    }

    .precio{
      color:#6b0000;
      font-size:20px;
      font-weight:bold;
    }

    .btn{
      display:inline-block;
      margin:15px;
      padding:10px 20px;
      background:#6b0000;
      color:white;
      text-decoration:none;
      border-radius:5px;
      cursor:pointer;
    }

    .btn:hover{
      background:#8b0000;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Licores Galileo</div>

  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="noticias.html">Noticias</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="info.html">Sobre Nosotros</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="ubi.html">Ubicaciones</a></li>
      <li><a href="pregunta.html">Preguntas frecuentes</a></li>
    </ul>
  </nav>

  <!-- Icono carrito -->
  <div class="carrito">
    <a href="carrito.html">🛒</a>
    <span id="contador">0</span>
  </div>
</header>

<div class="contenedor">

  <div class="producto">
    <img src="bluelabel.jpg" alt="Whisky">
    <h3>Whisky JW etiqueta Azul</h3>
    <p class="precio">Q1250.00</p>
    <button class="btn" onclick="addToCart('Whisky JW etiqueta Azul', 1250)">Agregar al carrito</button>
  </div>

  <div class="producto">
    <img src="jackdaniels.jpg" alt="Whisky">
    <h3>Whisky Jack Daniels</h3>
    <p class="precio">Q750.00</p>
    <button class="btn" onclick="addToCart('Whisky Jack Daniels', 750)">Agregar al carrito</button>
  </div>

  <div class="producto">
    <img src="redlabel.jpg" alt="Whisky">
    <h3>Whisky JW etiqueta Roja</h3>
    <p class="precio">Q480.00</p>
    <button class="btn" onclick="addToCart('Whisky JW etiqueta Roja', 480)">Agregar al carrito</button>
  </div>

</div>

<script>
  let carrito = [];
  let contador = document.getElementById('contador');

  function addToCart(nombre, precio) {
    carrito.push({nombre, precio});
    contador.textContent = carrito.length;
    console.log("Carrito:", carrito); // Para ver en consola
  }
</script>

</body>
</html>
