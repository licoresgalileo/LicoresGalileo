            background:white;

            box-shadow:0 0 10px rgba(0,0,0,0.2);

        }

            margin:10px 0;

        .precio{
            color:#6b0000;
            font-size:20px;
            font-weight:bold;
        }

        .btn{

            margin:15px;
            padding:10px 20px;
            background:#6b0000;
            color:white;
            text-decoration:none;
