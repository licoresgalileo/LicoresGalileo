<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - Licores Galileo</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
    body{background:#f4f4f4;}

    header{
      background:#6b0000;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{font-size:28px;font-weight:bold;}

    nav ul{list-style:none;display:flex;}
    nav ul li{margin-left:20px;}
    nav ul li a{color:white;text-decoration:none;font-size:18px;transition:0.3s;}
    nav ul li a:hover{color:#ffd700;}

    /* Carrito */
    .carrito {
      position: relative;
      font-size: 28px;
      margin-left: 20px;
      cursor:pointer;
    }
    .carrito #contador {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #ffd700;
      color: #6b0000;
      font-size: 14px;
      font-weight: bold;
      border-radius: 50%;
      padding: 2px 6px;
    }

    .contenedor{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      padding:30px;
    }

    .producto{
      width:250px;
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      text-align:center;
      padding-bottom:15px;
    }
    .producto img{width:100%;height:250px;object-fit:cover;}
    .producto h3{margin:10px 0;}
    .precio{color:#6b0000;font-size:20px;font-weight:bold;}
    .cantidad-input {
      width:60px;
      padding:5px;
      margin-top:10px;
      text-align:center;
    }
    .btn{display:inline-block;margin-top:10px;padding:10px 20px;background:#6b0000;color:white;text-decoration:none;border-radius:5px;cursor:pointer;}
    .btn:hover{background:#8b0000;}

    /* Overlay carrito */
    .overlay {
      position: fixed;
      top:0;left:0;width:100%;height:100%;
      background: rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }
    .overlay-content {
      background:white;
      padding:20px;
      border-radius:10px;
      width:400px;
      max-height:80%;
      overflow-y:auto;
    }
    .overlay-content h2 {margin-bottom:15px;color:#6b0000;}
    .overlay-content ul {list-style:none;padding:0;}
    .overlay-content li {margin-bottom:10px;border-bottom:1px solid #ccc;padding-bottom:5px;}
    .close-btn {background:#6b0000;color:white;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;margin-top:15px;}
    .close-btn:hover {background:#8b0000;}
  </style>
</head>
<body>

<header>
  <div class="logo">Licores Galileo</div>
  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="noticias.html">Noticias</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="info.html">Sobre Nosotros</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="ubi.html">Ubicaciones</a></li>
      <li><a href="pregunta.html">Preguntas frecuentes</a></li>
    </ul>
  </nav>
  <!-- Icono carrito -->
  <div class="carrito" onclick="mostrarCarrito()">
    🛒 <span id="contador">0</span>
  </div>
</header>

<div class="contenedor">
  <div class="producto">
    <img src="bluelabel.jpg" alt="Whisky">
    <h3>Whisky JW etiqueta Azul</h3>
    <p class="precio">Q1250.00</p>
    <input type="number" id="cant1" class="cantidad-input" value="1" min="1">
    <button class="btn" onclick="addToCart('Whisky JW etiqueta Azul', 1250, document.getElementById('cant1').value)">Agregar al carrito</button>
  </div>

  <div class="producto">
    <img src="jackdaniels.jpg" alt="Whisky">
    <h3>Whisky Jack Daniels</h3>
    <p class="precio">Q750.00</p>
    <input type="number" id="cant2" class="cantidad-input" value="1" min="1">
    <button class="btn" onclick="addToCart('Whisky Jack Daniels', 750, document.getElementById('cant2').value)">Agregar al carrito</button>
  </div>

  <div class="producto">
    <img src="redlabel.jpg" alt="Whisky">
    <h3>Whisky JW etiqueta Roja</h3>
    <p class="precio">Q480.00</p>
    <input type="number" id="cant3" class="cantidad-input" value="1" min="1">
    <button class="btn" onclick="addToCart('Whisky JW etiqueta Roja', 480, document.getElementById('cant3').value)">Agregar al carrito</button>
  </div>
</div>

<!-- Overlay carrito -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <h2>Tu Carrito</h2>
    <ul id="listaCarrito"></ul>
    <p><strong>Total: Q<span id="total">0</span></strong></p>
    <button class="close-btn" onclick="cerrarCarrito()">Cerrar</button>
  </div>
</div>

<script>
  let carrito = [];
  let contador = document.getElementById('contador');
  let listaCarrito = document.getElementById('listaCarrito');
  let totalSpan = document.getElementById('total');

  function addToCart(nombre, precio, cantidad) {
    cantidad = parseInt(cantidad);
    carrito.push({nombre, precio, cantidad});
    actualizarContador();
  }

  function actualizarContador() {
    let totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
    contador.textContent = totalItems;
  }

  function mostrarCarrito() {
    listaCarrito.innerHTML = '';
    let total = 0;
    carrito.forEach(item => {
      let li = document.createElement('li');
      li.textContent = `${item.nombre} x${item.cantidad} - Q${item.precio * item.cantidad}`;
      listaCarrito.appendChild(li);
      total += item.precio * item.cantidad;
    });
    totalSpan.textContent = total;
    document.getElementById('overlay').style.display = 'flex';
  }

  function cerrarCarrito() {
    document.getElementById('overlay').style.display = 'none';
  }
</script>

</body>
</html>
