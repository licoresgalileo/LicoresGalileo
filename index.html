<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licores Galileo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color:#f4f4f4;
        }

        header{
            background:#6b0000;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
        }

        nav ul{
            list-style:none;
            display:flex;
        }

        nav ul li{
            margin-left:20px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            transition:0.3s;
        }

        nav ul li a:hover{
            color:#ffd700;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .hero h1{
            font-size:48px;
            color:#6b0000;
        }

        .hero p{
            margin-top:15px;
            font-size:20px;
            color:#555;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 25px;
            background:#6b0000;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#8b0000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🍷 Licores Galileo</div>

        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Productos</a></li>
                <li><a href="#">Promociones</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Bienvenido a Licores Galileo</h1>
        <p>Encuentra las mejores bebidas al mejor precio.</p>
        <a href="#" class="btn">Ver Catálogo</a>
    </section>

</body>
</html>
